name: TRUVA Server Scraper (Saatlik)

on:
  schedule:
    - cron: '0 * * * *'   # Her saat başı tetiklenir
  workflow_dispatch:       # Manuel çalıştırma butonu

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Depoyu Klonla (Checkout)
        uses: actions/checkout@v3

      - name: Python Ortamını Kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Kütüphaneleri Yükle
        run: pip install -r requirements.txt

      - name: Xray Core İndir (Linux)
        run: |
          wget https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip Xray-linux-64.zip -d .
          chmod +x xray

      - name: Botu Çalıştır (Havuz Yönetimi)
        run: python manager.py

      - name: GitHub Pages'a Yükle (API Yayını)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          commit_message: "otomatik havuz güncellemesi (UDP Testli)"
