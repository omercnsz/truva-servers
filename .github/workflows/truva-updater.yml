name: Truva Sunucu Yöneticisi

on:
  schedule:
    # Her 30 dakikada bir otomatik çalışır
    - cron: '*/30 * * * *'
  workflow_dispatch: # İstediğin zaman GitHub üzerinden manuel tetikleyebilmen için buton ekler

jobs:
  update-servers:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Depoyu Çek
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Commit atabilmek için gerekli

      - name: Python'u Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Gerekli Kütüphaneleri Yükle
        run: |
          python -m pip install --upgrade pip
          pip install requests pysocks

      - name: Xray Core İndir ve Kur (Linux)
        run: |
          wget https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -o Xray-linux-64.zip -d xray_core
          mv xray_core/xray ./xray
          chmod +x ./xray
          rm -rf xray_core Xray-linux-64.zip

      - name: Truva Manager'ı Başlat (UDP Testleri)
        run: |
          python manager.py

      - name: Değişiklikleri Kaydet ve GitHub'a Yükle (Commit & Push)
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          # Eğer değişiklik varsa commit at, yoksa hata vermeden çık
          git commit -m "🚀 Otomatik Güncelleme: Sağlıklı UDP Sunucuları Çekildi" || exit 0
          git push
